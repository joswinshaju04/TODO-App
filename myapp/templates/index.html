<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <label for="name">Name:</label>
        <input type="text" id="name" name="taskname"><br><br>

        <label for="date" >Date:</label>
        <input type="date" id="date" name="taskdate"><br><br>

        <button type="submit">Submit</button>
    </form>
    <div>
        {% for i in item %}
            <p>{{i.taskname}}</p>
            <p>{{i.taskdate}}</p>
            <button><a href="{% url 'delete' i.id %}">Delete</a></button>
            <button><a href="{% url 'update' i.id %}">Update</a></button>
        {% endfor %}
    </div>
    
</body>
</html>
